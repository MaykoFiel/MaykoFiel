<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1">
        <animate attributeName="stop-color" values="#0d1117;#161b22;#0d1117" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1">
        <animate attributeName="stop-color" values="#161b22;#1f2937;#161b22" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1">
        <animate attributeName="stop-color" values="#1f2937;#0d1117;#1f2937" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Cyan accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Enhanced glow effect -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <clipPath id="circleClip">
      <circle cx="220" cy="200" r="90"/>
    </clipPath>
    
    <!-- Particle glow -->
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="1200" height="400" fill="url(#darkGrad)"/>
  
  <!-- Enhanced grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)"/>
  
  <!-- Animated particles with glow -->
  <circle cx="150" cy="80" r="4" fill="#00d9ff" opacity="0.6" filter="url(#particleGlow)">
    <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1050" cy="320" r="5" fill="#58a6ff" opacity="0.6" filter="url(#particleGlow)">
    <animate attributeName="cy" values="320;300;320" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="900" cy="100" r="3" fill="#7ee787" opacity="0.6" filter="url(#particleGlow)">
    <animate attributeName="cy" values="100;85;100" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1100" cy="150" r="4" fill="#00d9ff" opacity="0.6" filter="url(#particleGlow)">
    <animate attributeName="cy" values="150;135;150" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Rotating outer ring with cyan glow -->
  <circle cx="220" cy="200" r="110" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.3" filter="url(#strongGlow)">
    <animate attributeName="stroke-dasharray" values="0,690;345,345;690,0;345,345;0,690" dur="8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 220 200" to="360 220 200" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Pulsing middle ring -->
  <circle cx="220" cy="200" r="100" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.4">
    <animate attributeName="r" values="100;105;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Inner border with glow -->
  <circle cx="220" cy="200" r="95" fill="none" stroke="#00d9ff" stroke-width="3" opacity="0.8" filter="url(#strongGlow)"/>
  
  <!-- Profile photo -->
  <circle cx="220" cy="200" r="90" fill="#161b22"/>
  <image href="/images/imagem-20do-20whatsapp-20de-202025-05-18-20-c3-a0-28s-29-2008.jpg" 
         x="130" y="110" width="180" height="180" 
         clip-path="url(#circleClip)"
         preserveAspectRatio="xMidYMid slice"/>
  
  <!-- Decorative code brackets with animation -->
  <text x="420" y="140" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="32" fill="#58a6ff" opacity="0.7" filter="url(#strongGlow)">
    &lt;
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <text x="450" y="140" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="32" fill="#7ee787" opacity="0.9">
    developer
  </text>
  
  <text x="630" y="140" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="32" fill="#58a6ff" opacity="0.7" filter="url(#strongGlow)">
    /&gt;
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Main text with enhanced styling -->
  <text x="420" y="210" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="64" font-weight="bold" fill="#c9d1d9" filter="url(#strongGlow)">
    Mayko Fiel
  </text>
  
  <!-- Animated underline -->
  <line x1="420" y1="225" x2="420" y2="225" stroke="#00d9ff" stroke-width="4" opacity="0.8" filter="url(#strongGlow)">
    <animate attributeName="x2" values="420;750;420" dur="4s" repeatCount="indefinite"/>
  </line>
  
  <text x="420" y="260" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="28" fill="#8b949e" opacity="0.9">
    Desenvolvedor Java Júnior
  </text>
  
  <text x="420" y="295" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="20" fill="#6e7681">
    Back-End Developer | Engenharia de Software
  </text>
  
  <!-- Animated tech stack with icons -->
  <g transform="translate(420, 330)">
    <rect x="0" y="0" width="400" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" opacity="0.8"/>
    
    <text x="15" y="27" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#00d9ff">
      $
    </text>
    
    <text x="35" y="27" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" fill="#7ee787">
      <tspan>tech-stack:</tspan>
      <tspan fill="#c9d1d9"> Java</tspan>
      <tspan fill="#6e7681"> •</tspan>
      <tspan fill="#c9d1d9"> OOP</tspan>
      <tspan fill="#6e7681"> •</tspan>
      <tspan fill="#c9d1d9"> Git</tspan>
      <tspan fill="#6e7681"> •</tspan>
      <tspan fill="#c9d1d9"> Clean Code</tspan>
    </text>
    
    <!-- Blinking cursor -->
    <rect x="390" y="12" width="2" height="20" fill="#00d9ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Floating tech icons with enhanced animations -->
  <g transform="translate(950, 150)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2" opacity="0.9">
      <animate attributeName="y" values="0;-15;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="55" font-size="40" text-anchor="middle" fill="#00d9ff" filter="url(#particleGlow)">☕</text>
  </g>
  
  <g transform="translate(1050, 150)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2" opacity="0.9">
      <animate attributeName="y" values="0;-15;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="55" font-size="40" text-anchor="middle" fill="#7ee787" filter="url(#particleGlow)">💻</text>
  </g>
  
  <g transform="translate(1000, 250)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2" opacity="0.9">
      <animate attributeName="y" values="0;-15;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="55" font-size="40" text-anchor="middle" fill="#58a6ff" filter="url(#particleGlow)">🚀</text>
  </g>
  
  <!-- Bottom wave decoration -->
  <path d="M0,360 Q300,340 600,360 T1200,360 L1200,400 L0,400 Z" fill="url(#accentGrad)" opacity="0.3">
    <animate attributeName="d" 
             values="M0,360 Q300,340 600,360 T1200,360 L1200,400 L0,400 Z;
                     M0,360 Q300,380 600,360 T1200,360 L1200,400 L0,400 Z;
                     M0,360 Q300,340 600,360 T1200,360 L1200,400 L0,400 Z" 
             dur="8s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Additional accent lines -->
  <path d="M0,380 Q300,365 600,380 T1200,380 L1200,400 L0,400 Z" fill="#00d9ff" opacity="0.1">
    <animate attributeName="d" 
             values="M0,380 Q300,365 600,380 T1200,380 L1200,400 L0,400 Z;
                     M0,380 Q300,395 600,380 T1200,380 L1200,400 L0,400 Z;
                     M0,380 Q300,365 600,380 T1200,380 L1200,400 L0,400 Z" 
             dur="6s" 
             repeatCount="indefinite"/>
  </path>
</svg>

